<title>NEVERMIND Shop</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05090f;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;color:#c8d8f0}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(20,80,200,.13) 0%,transparent 70%);pointer-events:none}
.wrap{text-align:center;padding:0 20px}
.logo{width:90px;height:90px;border-radius:18px;overflow:hidden;margin:0 auto 22px;box-shadow:0 0 0 1px rgba(29,110,245,.3),0 8px 32px rgba(0,0,0,.5)}
.logo img{width:100%;height:100%;object-fit:cover}
.name{font-family:'Montserrat',sans-serif;font-weight:900;font-size:28px;letter-spacing:.06em;color:#fff;text-transform:uppercase}
.sep{width:40px;height:2px;background:#1d6ef5;border-radius:2px;margin:14px auto}
.msg{font-size:14px;color:#4a6080;letter-spacing:.02em;line-height:1.6;min-height:20px}
.spinner{width:28px;height:28px;border:2px solid rgba(29,110,245,.15);border-top-color:#4d9fff;border-radius:50%;margin:18px auto 0;animation:spin .75s linear infinite}
.spinner.hidden{display:none}
.check{width:28px;height:28px;margin:18px auto 0;display:none}
.check.visible{display:block}
.err{font-size:22px;color:#ef4444;margin-top:18px;display:none}
.err.visible{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes drawCheck{to{stroke-dashoffset:0}}
</style>
