<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEVERMIND — Vérification</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #2563eb;
      --blue-glow: rgba(37, 99, 235, 0.35);
      --bg:        #05070f;
      --surface:   #0b0f1e;
      --border:    rgba(37, 99, 235, 0.2);
      --text:      #e2e8f0;
      --muted:     #475569;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(37,99,235,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(37,99,235,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .scene {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 15vw, 160px);
      line-height: 0.88;
      letter-spacing: 0.02em;
      text-align: center;
      color: #fff;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.2s;
    }

    .title span {
      color: var(--blue);
      display: block;
    }

    .card {
      margin-top: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 56px;
      text-align: center;
      min-width: 340px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.35s;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.6s ease, border-color 0.6s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 2px solid rgba(37,99,235,0.15);
      border-top-color: var(--blue);
      border-radius: 50%;
      margin: 0 auto 22px;
      animation: spin 0.8s linear infinite;
    }
    .spinner.hidden { display: none; }

    .check {
      width: 52px;
      height: 52px;
      margin: 0 auto 22px;
      display: none;
    }
    .check.visible { display: block; }

    .err-icon {
      font-size: 38px;
      margin-bottom: 18px;
      display: none;
      color: #ef4444;
      font-style: normal;
    }
    .err-icon.visible { display: block; }

    .status-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .status-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .status-main.blue { color: var(--blue); }
    .status-main.red  { color: #ef4444; }

    .status-sub {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 260px;
      margin-left: auto;
      margin-right: auto;
    }

    .card.success {
      border-color: rgba(37,99,235,0.45);
      box-shadow: 0 0 50px var(--blue-glow), 0 0 100px rgba(37,99,235,0.1);
      animation: fadeUp 0.7s ease forwards 0.35s, pulse 2.5s ease-in-out infinite 1s;
    }

    .footer {
      position: fixed;
      bottom: 28px;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 50px var(--blue-glow), 0 0 100px rgba(37,99,235,0.1); }
      50%       { box-shadow: 0 0 70px rgba(37,99,235,0.5), 0 0 140px rgba(37,99,235,0.15); }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="label">NEVERMIND Shop</div>
    <div class="title">NEVER<span>MIND</span></div>

    <div class="card" id="card">
      <div class="spinner" id="spinner"></div>

      <div class="check" id="check">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="24" stroke="#2563eb" stroke-width="1.5" opacity="0.25"/>
          <polyline points="14,27 22,35 38,18"
            stroke="#2563eb" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="34" stroke-dashoffset="34"
            id="checkmark"/>
        </svg>
      </div>

      <i class="err-icon" id="errIcon">&#x2715;</i>

      <div class="status-text" id="statusText">Redirection en cours</div>
      <div class="status-main" id="statusMain">Patiente...</div>
      <div class="status-sub" id="statusSub">Tu vas être redirigé vers le serveur de vérification.</div>
    </div>
  </div>

  <div class="footer">NEVERMIND &mdash; Shop &amp; Checker</div>

  <script>
    // Remplace par ton URL Railway (sans slash final)
    // ex: https://nevermind-bot.up.railway.app
    const SERVER_URL = 'https://exhume-rocket-staple.ngrok-free.dev';

    const spinner    = document.getElementById('spinner');
    const check      = document.getElementById('check');
    const errIcon    = document.getElementById('errIcon');
    const statusText = document.getElementById('statusText');
    const statusMain = document.getElementById('statusMain');
    const statusSub  = document.getElementById('statusSub');
    const card       = document.getElementById('card');
    const checkmark  = document.getElementById('checkmark');

    function showSuccess() {
      spinner.classList.add('hidden');
      check.classList.add('visible');
      card.classList.add('success');
      statusText.textContent = 'Vérification réussie';
      statusMain.textContent = 'Bienvenue';
      statusMain.classList.add('blue');
      statusSub.textContent  = 'Tu peux fermer cette page et retourner sur Discord.';
      checkmark.style.animation = 'drawCheck 0.45s ease forwards';
    }

    function showError(msg) {
      spinner.classList.add('hidden');
      errIcon.classList.add('visible');
      statusText.textContent = 'Erreur';
      statusMain.textContent = 'Echec';
      statusMain.classList.add('red');
      statusSub.textContent  = msg || 'Une erreur est survenue. Réessaie.';
    }

    const code = new URLSearchParams(window.location.search).get('code');

    if (!code) {
      showError('Aucun code reçu de Discord.');
    } else {
      // Légère pause pour l'animation, puis redirection vers Railway
      setTimeout(() => {
        window.location.href = SERVER_URL + '/callback?code=' + encodeURIComponent(code);
      }, 900);

      // Si on est toujours là après 8s, le serveur est injoignable
      setTimeout(() => {
        showError('Serveur injoignable. Vérifie que le bot est en ligne.');
      }, 8000);
    }
  </script>
</body>
</html>
